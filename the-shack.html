<!DOCTYPE html>

<head>

    <style>
        nav.fixed-header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(5, 5, 5, 0.95) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(176, 169, 144, 0.15);
            padding: 1rem 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s ease;
        }
        nav.fixed-header img { height: 50px; }
        .whatsapp-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border-radius: 999px;
            background: #9f1239;
            color:white;
            text-decoration:none;
        }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { color: var(--khaki, #b0a990); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.current { color: var(--text-color, #f8f8f8); }
        .nav-links.active { right: 0; }
        .mobile-toggle { display: none; cursor: pointer; flex-direction: column; gap: 6px; }
        .mobile-toggle span { width: 25px; height: 2px; background: var(--khaki, #b0a990); transition: 0.3s; }

        @media (max-width: 768px) {
            .nav-links { position: fixed; top: 0; right: -100%; width: 70%; height: 100vh; background: rgba(5,5,5,0.98); flex-direction: column; justify-content: center; padding-left: 2rem; border-left: 1px solid rgba(176,169,144,0.1); transition: 0.4s; }
            .nav-links.active { right: 0; }
            .mobile-toggle { display: flex; }
            .nav-links a { font-size: 1rem; padding: 1rem 0; }
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* === SMOOTH SCROLLING (already here) === */
        html { scroll-behavior: smooth; }

        /* === EASY SCROLL (added only this for premium mobile + desktop momentum) === */
        body, .panorama-gallery {
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }

        /* === WHOLE PAGE SCROLLS WITH EASE (only this new block added) === */
        html, body {
            height: auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* === NAV SCROLL EFFECT === */
        nav#main-nav {
            transition: all 0.5s ease;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(120, 113, 108, 0.3);
        }
        nav#main-nav.scrolled {
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(176, 169, 144, 0.1);
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
        }
        /* Harmonize header */
        @media (min-width: 768px) {
            nav.fixed { height: 64px; }
            nav.fixed img { height: 48px; }
            body { padding-top: 64px; }
        }
        @media (max-width: 768px) {
            body { padding-top: 84px; }
        }
        /* Gallery scroll styling */
        .panorama-gallery {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem 6%;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }
        .panorama-gallery::-webkit-scrollbar { display: none; }
        .panorama-card {
            flex: 0 0 320px;
            height: 480px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .panorama-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        /* === HOVER POP UP 10% (already here) === */
        .panorama-card:hover img {
            transform: scale(1.1);
        }
    
/* Mobile soft border and safe viewport */
        @media (max-width: 768px) {
            html, body { min-height: 100%; width: 100%; overflow-x: hidden; }
            body { padding: 0 14px 20px; margin: 0; }
            nav#main-nav { left: 0; right: 0; width: calc(100% - 28px); margin: 0 auto; border-left: 1px solid rgba(176,169,144,0.25); border-right: 1px solid rgba(176,169,144,0.25); }
            #mobile-menu { border-left: 1px solid rgba(176,169,144,0.25); border-right: 1px solid rgba(176,169,144,0.25); }
            .mobile-layout, .mobile-hero, .content-split, .menu-gallery, .editorial-container, .grid-layout, .product-flex { max-width: 100%; margin: 0 auto; padding: 0; }
        }
</style>
</head>
<body class="bg-[#1a1a1a] text-stone-200">

    <!-- === NEW HERO SECTION WITH YOUR IMAGE === -->
    <section class="hero" style="height: 100vh; background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.85)), url('_X1A3238-2.jpg') center/cover no-repeat; display: flex; align-items: center; justify-content: center; text-align: center; position: relative;">

    <!-- Modal (kept from your menu page style) -->
    <div id="menuModal" class="modal" onclick="closeModal(event)">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("mobile-menu").classList.toggle("hidden");
        }

        const modal = document.getElementById("menuModal");
        const modalImg = document.getElementById("modalImg");

        function openModal(imageSrc) {
            modalImg.src = imageSrc;
            modal.style.display = "flex";
            setTimeout(() => modal.classList.add("show"), 10);
            document.body.style.overflow = "hidden";
        }

        function closeModal(event) {
            if (event.target === modal || event.target.classList.contains('close-btn')) {
                modal.classList.remove("show");
                setTimeout(() => modal.style.display = "none", 400);
                document.body.style.overflow = "auto";
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && modal.classList.contains("show")) {
                closeModal({ target: modal });
            }
        });

        // Horizontal Mousewheel support
        document.querySelectorAll('.menu-gallery').forEach(gallery => {
            gallery.addEventListener('wheel', (evt) => {
                evt.preventDefault();
                gallery.scrollLeft += evt.deltaY;
            });
        });
    </script>


<script>
    (function(){
        if (window._stasieResponsiveInit) return;
        window._stasieResponsiveInit = true;

        window.toggleMenu = window.toggleMenu || function() {
            const menu = document.getElementById('mobile-menu');
            if (!menu) return;
            menu.classList.toggle('hidden');
        };

        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('mobile-menu-btn');
            if (btn) btn.addEventListener('click', window.toggleMenu);
        });
    })();
    </script>
