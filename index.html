<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montagu Stasie | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        nav.fixed-header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(5, 5, 5, 0.95) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(176, 169, 144, 0.15);
            padding: 1rem 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s ease;
        }
        nav.fixed-header img { height: 50px; }
        .whatsapp-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border-radius: 999px;
            background: #9f1239;
            color:white;
            text-decoration:none;
        }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { color: var(--khaki, #b0a990); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.current { color: var(--text-color, #f8f8f8); }
        .nav-links.active { right: 0; }
        .mobile-toggle { display: none; cursor: pointer; flex-direction: column; gap: 6px; }
        .mobile-toggle span { width: 25px; height: 2px; background: var(--khaki, #b0a990); transition: 0.3s; }

        @media (max-width: 768px) {
            .nav-links { position: fixed; top: 0; right: -100%; width: 70%; height: 100vh; background: rgba(5,5,5,0.98); flex-direction: column; justify-content: center; padding-left: 2rem; border-left: 1px solid rgba(176,169,144,0.1); transition: 0.4s; }
            .nav-links.active { right: 0; }
            .mobile-toggle { display: flex; }
            .nav-links a { font-size: 1rem; padding: 1rem 0; }
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@200;300;400&display=swap');
        
        :root {
            --deep-black: #050505;
            --brass: #c4a77d;
            --khaki: #b0a990;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--deep-black);
            overflow: hidden; 
            margin: 0;
            padding: 0;
        }

        /* Cinematic Background with the new Hero Image */
        .intro { 
            height: 100vh; 
            height: 100dvh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            flex-direction: column; 
            background: linear-gradient(to bottom, rgba(5, 5, 5, 0) 40%, rgba(5, 5, 5, 1) 95%), 
                        url('_X1A2940.webp') center/cover no-repeat;
            position: relative;
        }

        .typewriter { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.4rem; 
            line-height: 1.4; 
            color: var(--brass); 
            min-height: 120px;
            font-style: italic;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-top: auto; 
            margin-bottom: 4rem;
            z-index: 10;
            padding: 0 20px;
        }

        .enter-btn {
            padding: 1.2rem 4rem;
            border: 1px solid rgba(176, 169, 144, 0.3);
            border-radius: 9999px;
            color: var(--khaki);
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            background: transparent;
            z-index: 10;
            text-decoration: none;
            margin-bottom: 10vh;
        }

        .enter-btn:hover {
            border-color: var(--brass);
            color: var(--deep-black);
            background-color: var(--brass);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .intro::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
            opacity: 0.05;
            pointer-events: none;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .typewriter {
                font-size: 1.6rem;
                min-height: 90px;
                margin-bottom: 2.5rem;
                letter-spacing: 0.5px;
            }
            
            .enter-btn {
                padding: 1rem 2.5rem;
                font-size: 0.75rem;
                letter-spacing: 0.25em;
                margin-bottom: 8vh;
            }

            .intro {
                background-position: 60% center; 
            }
        }
    </style>
</head>
<body>

    <section class="intro">
        <div id="typewriter" class="typewriter max-w-4xl px-6"></div>

        <a href="main.html" class="enter-btn">
            Enter the Station
        </a>
    </section>

    <script>
        const messages = [
            "The old bus station whispers your name...",
            "Where journeys once paused... magic now begins.",
            "Come, the fire is waiting for you.",
            "Let the Karoo light your path home."
        ];
        
        let i = 0, txt = '', messageIndex = 0;

        function typeWriter() {
            const currentMessage = messages[messageIndex];
            
            if (i < currentMessage.length) {
                txt += currentMessage.charAt(i);
                document.getElementById("typewriter").innerHTML = txt;
                i++;
                setTimeout(typeWriter, 70);
            } else {
                setTimeout(() => {
                    fadeOutEffect();
                }, 3000);
            }
        }

        function fadeOutEffect() {
            const el = document.getElementById("typewriter");
            el.style.transition = "opacity 1s ease";
            el.style.opacity = "0";
            
            setTimeout(() => {
                i = 0; 
                txt = '';
                messageIndex = (messageIndex + 1) % messages.length;
                el.innerHTML = '';
                el.style.opacity = "1";
                typeWriter();
            }, 1000);
        }

        window.onload = typeWriter;
    </script>


    <script>
    function toggleMenu(){
        const links = document.getElementById('nav-links');
        if(!links) return;
        links.classList.toggle('active');
    }
    document.addEventListener('DOMContentLoaded', function(){
        const btn = document.querySelector('.mobile-toggle');
        if(btn) btn.addEventListener('click', toggleMenu);
    });
    </script>
</body>
</html>
