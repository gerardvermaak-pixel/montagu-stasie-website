    <style>
        nav.fixed-header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(5, 5, 5, 0.95) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(176, 169, 144, 0.15);
            padding: 1rem 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s ease;
        }
        nav.fixed-header img { height: 50px; }
        .whatsapp-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border-radius: 999px;
            background: #9f1239;
            color:white;
            text-decoration:none;
        }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { color: var(--khaki, #b0a990); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.current { color: var(--text-color, #f8f8f8); }
        .nav-links.active { right: 0; }
        .mobile-toggle { display: none; cursor: pointer; flex-direction: column; gap: 6px; }
        .mobile-toggle span { width: 25px; height: 2px; background: var(--khaki, #b0a990); transition: 0.3s; }

        @media (max-width: 768px) {
            .nav-links { position: fixed; top: 0; right: -100%; width: 70%; height: 100vh; background: rgba(5,5,5,0.98); flex-direction: column; justify-content: center; padding-left: 2rem; border-left: 1px solid rgba(176,169,144,0.1); transition: 0.4s; }
            .nav-links.active { right: 0; }
            .mobile-toggle { display: flex; }
            .nav-links a { font-size: 1rem; padding: 1rem 0; }
        }

        header img { height: 52px; }
        nav.fixed { height: 72px; }
        nav.fixed img { height: 52px; }
        @media (min-width: 768px) { body { padding-top: 72px; } }
        /* Harmonize header */
        @media (min-width: 768px) {
            nav.fixed { height: 64px; }
            nav.fixed img { height: 48px; }
            body { padding-top: 64px; }
        }
    
/* Mobile soft border and safe viewport */
        @media (max-width: 768px) {
            html, body { min-height: 100%; width: 100%; overflow-x: hidden; }
            body { padding: 0 14px 20px; margin: 0; }
            nav#main-nav { left: 0; right: 0; width: calc(100% - 28px); margin: 0 auto; border-left: 1px solid rgba(176,169,144,0.25); border-right: 1px solid rgba(176,169,144,0.25); }
            #mobile-menu { border-left: 1px solid rgba(176,169,144,0.25); border-right: 1px solid rgba(176,169,144,0.25); }
            .mobile-layout, .mobile-hero, .content-split, .menu-gallery, .editorial-container, .grid-layout, .product-flex { max-width: 100%; margin: 0 auto; padding: 0; }
        }

        /* === IMPROVED DESKTOP GALLERY (only this section changed) === */
        #gallery.masonry {
            column-width: 320px;
            column-gap: 20px;
            padding: 20px 0;
        }
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .masonry-item:hover {
            transform: scale(1.04);
            box-shadow: 0 25px 50px rgba(159, 18, 57, 0.3);
        }
        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 450ms cubic-bezier(.2,.8,.2,1);
        }
        .masonry-item:hover img {
            transform: scale(1.06);
        }

        /* Hover overlay with title */
        .masonry-item::after {
            content: attr(data-title);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(10,10,10,0.85));
            color: white;
            padding: 30px 20px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.4s ease;
            text-align: center;
        }
        .masonry-item:hover::after {
            opacity: 1;
        }

        /* Lightbox */
        #lightboxOverlay { 
            position:fixed; 
            inset:0; 
            background:rgba(0,0,0,0.92); 
            display:none; 
            align-items:center; 
            justify-content:center; 
            z-index:3000; 
        }
        #lightboxOverlay img { 
            max-width:92%; 
            max-height:92vh; 
            box-shadow:0 30px 60px rgba(0,0,0,0.7); 
            border-radius:12px; 
        }

        @media (max-width:900px){ 
            /* Single column, full-width masonry on small screens */
            #gallery.masonry{ column-width: 100% !important; column-gap: 0; padding: 0; }
            .masonry-item { margin: 0 0 16px 0; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
            .masonry-item::after { display: none; }
            .masonry-item img { width: 100%; height: auto; display: block; border-radius: 8px; }
            /* Reduce hero spacer on mobile */
            .hero-spacer { min-height: 180px; }
            /* Disable hover transforms on touch devices */
            .masonry-item:hover { transform: none; box-shadow: 0 8px 20px rgba(0,0,0,0.35); }
        }
    </style>
</head>

    <!-- Hero spacer to preserve page layout while keeping gallery animation -->

    <!-- Gallery Section: Improved for desktop (more visually appealing) -->
    <section id="gallery-section" class="py-12 px-6">
        <div class="max-w-6xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center mb-8">Gallery</h2>
            <div id="gallery" class="masonry"></div>

    <div id="lightboxOverlay" onclick="closeLightbox()"><img id="lightboxImg" src="" alt=""></div>

    <script>
    // List of image files from the project (auto-collected)
    const galleryImages = [
        "_X1A3232.jpg","_X1A3234.jpg","_X1A3235.jpg","_X1A3236.jpg","_X1A3199.jpg","_X1A3197-Enhanced-NR.jpg",
        "_X1A3065.jpg","_X1A2948-Enhanced-NR.jpg","_X1A2943.jpg","_X1A2940.jpg","_X1A2920.jpg","_X1A2887-Pano.jpg",
        "_X1A2879.jpg","_X1A2878.jpg","_X1A2874-Pano.jpg","_X1A2829.jpg","_X1A2828.jpg","_X1A2827.jpg","_X1A2825.jpg",
        "_X1A2808.jpg","_X1A2806.jpg","_X1A2784.jpg","_X1A2779.jpg","_X1A2742.jpg","_X1A2740.jpg","_X1A2739.jpg",
        "_X1A2732-Pano.jpg","_X1A2729.jpg","_X1A2727.jpg","_X1A3174-Edit.jpg","_X1A3127.jpg","_X1A2980.jpg","_X1A2962.jpg",
        "_X1A3238-2.jpg","_X1A2874-Pano.webp","_X1A2725.jpg","_X1A2723.jpg","Fbjh6.jpg","NmAOg.jpg"
    ];

    const galleryEl = document.getElementById('gallery');

    function renderGallery(list){
        galleryEl.style.opacity = 0;
        setTimeout(()=>{
            galleryEl.innerHTML = '';
            list.forEach((src,i)=>{
                const item = document.createElement('div');
                item.className = 'masonry-item';
                item.setAttribute('data-title', src.split('/').pop().replace(/-/g,' ').replace('.jpg','').replace('.webp',''));
                const img = document.createElement('img');
                img.src = src;
                img.alt = '';
                img.loading = 'lazy';
                img.onclick = ()=>openLightbox(src);
                item.appendChild(img);
                galleryEl.appendChild(item);
            });
            galleryEl.style.opacity = 1;
        }, 220);
    }

    function shuffle(a){ 
        for(let i=a.length-1;i>0;i--){ 
            const j=Math.floor(Math.random()*(i+1)); 
            [a[i],a[j]]=[a[j],a[i]] 
        } 
        return a 
    }

    function openLightbox(src){
        const overlay = document.getElementById('lightboxOverlay');
        const img = document.getElementById('lightboxImg');
        img.src = src; 
        overlay.style.display = 'flex';
    }
    function closeLightbox(){ 
        document.getElementById('lightboxOverlay').style.display = 'none'; 
    }

    document.addEventListener('DOMContentLoaded', function(){
        renderGallery(galleryImages.slice());
        // Gentle periodic shuffle
        setInterval(()=>{ renderGallery(shuffle(galleryImages.slice())); }, 9000);
    });
    </script>
