    const galleryEl = document.getElementById('gallery');

    function renderGallery(list){
        // fade out, then reorder
        galleryEl.style.opacity = 0;
        setTimeout(()=>{
            galleryEl.innerHTML = '';
            list.forEach((src,i)=>{
                const item = document.createElement('div');
                item.className = 'masonry-item';
                const img = document.createElement('img');
                img.src = src;
                img.alt = '';
                img.loading = 'lazy';
                img.onclick = ()=>openLightbox(src);
                // randomize animation phase so images fade independently
                img.style.animationDelay = (Math.random()*9).toFixed(2) + 's';
                // small random float to avoid perfectly static grid
                if (Math.random() > 0.85) item.classList.add('animate');
                item.appendChild(img);
                galleryEl.appendChild(item);
            });
            galleryEl.style.opacity = 1;
        }, 220);
    }

    // Shuffle array helper
    function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]] } return a }

    function openLightbox(src){
        const overlay = document.getElementById('lightboxOverlay');
        const img = document.getElementById('lightboxImg');
        img.src = src; overlay.style.display = 'flex';
    }
    function closeLightbox(){ document.getElementById('lightboxOverlay').style.display = 'none'; }
