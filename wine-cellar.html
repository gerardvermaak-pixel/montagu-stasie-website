<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        nav.fixed-header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(5, 5, 5, 0.95) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(176, 169, 144, 0.15);
            padding: 1rem 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s ease;
        }
        nav.fixed-header img { height: 50px; }
        .whatsapp-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border-radius: 999px;
            background: #9f1239;
            color:white;
            text-decoration:none;
        }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { color: var(--khaki, #b0a990); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.current { color: var(--text-color, #f8f8f8); }
        .nav-links.active { right: 0; }
        .mobile-toggle { display: none; cursor: pointer; flex-direction: column; gap: 6px; }
        .mobile-toggle span { width: 25px; height: 2px; background: var(--khaki, #b0a990); transition: 0.3s; }

        @media (max-width: 768px) {
            .nav-links { position: fixed; top: 0; right: -100%; width: 70%; height: 100vh; background: rgba(5,5,5,0.98); flex-direction: column; justify-content: center; padding-left: 2rem; border-left: 1px solid rgba(176,169,144,0.1); transition: 0.4s; }
            .nav-links.active { right: 0; }
            .mobile-toggle { display: flex; }
            .nav-links a { font-size: 1rem; padding: 1rem 0; }
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        /* Harmonize header */
        @media (min-width: 768px) {
            nav.fixed { height: 64px; }
            nav.fixed img { height: 48px; }
            body { padding-top: 64px; }
        }
        @media (max-width: 768px) {
            body { padding-top: 84px; }
        }
    
/* Mobile soft border and safe viewport */
        @media (max-width: 768px) {
            html, body { min-height: 100%; width: 100%; overflow-x: hidden; }
            body { padding: 0 14px 20px; margin: 0; }
            nav#main-nav { left: 0; right: 0; width: calc(100% - 28px); margin: 0 auto; border-left: 1px solid rgba(176,169,144,0.25); border-right: 1px solid rgba(176,169,144,0.25); }
            #mobile-menu { border-left: 1px solid rgba(176,169,144,0.25); border-right: 1px solid rgba(176,169,144,0.25); }
            .mobile-layout, .mobile-hero, .content-split, .menu-gallery, .editorial-container, .grid-layout, .product-flex { max-width: 100%; margin: 0 auto; padding: 0; }
        }
</style>
</head>
<body class="bg-[#1a1a1a] text-stone-200">

    <!-- NAVBAR -->
    <nav class="fixed-header">
    <a href="index.html"><img src="station logo lines.png" alt="Montagu Stasie"></a>
    <a href="https://wa.me/27662665145" class="bg-[#9f1239] whatsapp-center"><i class="fa-brands fa-whatsapp"></i></a>
    <div class="nav-links" id="nav-links">
        <a href="main.html">HOME</a>
        <a href="konkelwyn.html">KONKELWYN</a>
        <a href="menu.html">MENUS</a>
        <a href="events.html">EVENTS</a>
        <a href="crypto.html">CRYPTO</a>
    </div>
    <div class="mobile-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></div>
</nav>

    <section class="pt-28 pb-20">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <h1 class="text-6xl font-bold tracking-tighter mb-6">SHOP NAME HERE</h1>
            <p class="text-2xl text-stone-400 max-w-2xl mx-auto">Short description of this shop/experience goes here.</p>
            <a href="https://wa.me/27662665145?text=I'd like to visit [SHOP NAME]" class="mt-12 inline-block bg-[#9f1239] px-10 py-5 rounded-full text-lg font-semibold">Visit this shop via WhatsApp</a>
        </div>
    </section>


<script>
    (function(){
        if (window._stasieResponsiveInit) return;
        window._stasieResponsiveInit = true;

        window.toggleMenu = window.toggleMenu || function() {
            const menu = document.getElementById('mobile-menu');
            if (!menu) return;
            menu.classList.toggle('hidden');
        };

        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('mobile-menu-btn');
            if (btn) btn.addEventListener('click', window.toggleMenu);
        });
    })();
    </script>

    <script>
    function toggleMenu(){
        const links = document.getElementById('nav-links');
        if(!links) return;
        links.classList.toggle('active');
    }
    document.addEventListener('DOMContentLoaded', function(){
        const btn = document.querySelector('.mobile-toggle');
        if(btn) btn.addEventListener('click', toggleMenu);
    });
    </script>
</body>
</html>
