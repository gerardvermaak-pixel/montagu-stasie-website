    <style>
        nav.fixed-header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(5, 5, 5, 0.95) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(176, 169, 144, 0.15);
            padding: 1rem 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s ease;
        }
        nav.fixed-header img { height: 50px; }
        .whatsapp-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border-radius: 999px;
            background: #9f1239;
            color:white;
            text-decoration:none;
        }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { color: var(--khaki, #b0a990); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.current { color: var(--text-color, #f8f8f8); }
        .nav-links.active { right: 0; }
        .mobile-toggle { display: none; cursor: pointer; flex-direction: column; gap: 6px; }
        .mobile-toggle span { width: 25px; height: 2px; background: var(--khaki, #b0a990); transition: 0.3s; }

        @media (max-width: 768px) {
            .nav-links { position: fixed; top: 0; right: -100%; width: 70%; height: 100vh; background: rgba(5,5,5,0.98); flex-direction: column; justify-content: center; padding-left: 2rem; border-left: 1px solid rgba(176,169,144,0.1); transition: 0.4s; }
            .nav-links.active { right: 0; }
            .mobile-toggle { display: flex; }
            .nav-links a { font-size: 1rem; padding: 1rem 0; }
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; padding-top: 96px; overflow-x: hidden; }
        
        .serif { font-family: 'Playfair Display', serif; }

        /* === FULL MONTH CALENDAR (already full March 2026) === */
        .calendar-day {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            background: rgba(40, 40, 40, 0.4);
            backdrop-filter: blur(5px);
        }
        .calendar-day:hover {
            background: rgba(159, 18, 57, 0.2);
            border-color: #9f1239;
            transform: scale(1.02);
        }
        .calendar-day.has-event { border-bottom: 2px solid #9f1239; cursor: pointer; }

        /* === AUTOMATIC SLIDESHOW OF PAST EVENTS (updated with your new posters) === */
        .slideshow {
            width: 100%;
            overflow: hidden;
            background: #0a0a0a;
        }
        .slideshow-inner {
            display: flex;
            width: 800%;
            animation: slideShow 35s linear infinite;
        }
        .slideshow-inner img {
            width: 12.5%;
            height: 520px;
            object-fit: cover;
            flex-shrink: 0;
        }
        @keyframes slideShow {
            0% { transform: translateX(0); }
            100% { transform: translateX(-87.5%); }
        }

        /* Poster Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            cursor: zoom-out;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #lightbox img { max-height: 90vh; max-width: 95vw; object-fit: contain; border-radius: 4px; }

        /* Live Show Banner */
        .live-banner {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('WhatsApp Image 2026-03-17 at 12.48.51.jpeg');
            background-size: cover;
            background-position: center;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2rem;
            margin-bottom: 4rem;
        }

        @media (max-width: 768px) { body { padding-top: 84px; } .live-banner { height: 100vh; } }
    </style>
</head>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="" alt="Full View">
        <div class="absolute top-10 right-10 text-white text-3xl">&times;</div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("nav-links");
            menu.classList.toggle("active");
        }

        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            lbImg.src = src;
            lb.style.display = 'flex';
        }

        function showEvent(title, detail) {
            const display = document.getElementById('event-display');
            document.getElementById('event-title').innerText = title;
            document.getElementById('event-detail').innerText = detail;
            display.classList.remove('hidden');
            display.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
